name: Release NuGet Packages

# Triggers on any tag that starts with "v" (e.g. v10.0.3, v10.0.3-rc.1)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish NuGet Packages
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate versioning

      # ── Extract version from tag ──────────────────────────────────────────
      # Tag "v10.0.3"      → VERSION = "10.0.3"
      # Tag "v10.0.3-rc.1" → VERSION = "10.0.3-rc.1"
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION} from tag: ${TAG}"

      # ── Set version in the single source of truth ─────────────────────────
      # libs/Directory.Build.Common.props is imported by every packable library
      # (C# via libs/Directory.Build.props, SQL via Directory.Build.Sql.props),
      # so writing the version here versions every package from one place.
      - name: Set version in Directory.Build.Common.props
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          FILE="libs/Directory.Build.Common.props"
          sed -i "s|<Version>[^<]*</Version>|<Version>${VERSION}</Version>|" "$FILE"
          grep -q "<Version>${VERSION}</Version>" "$FILE" \
            || { echo "::error::Failed to set <Version> in ${FILE}"; exit 1; }
          echo "Set version ${VERSION} in ${FILE}"

      # ── .NET SDK ──────────────────────────────────────────────────────────
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # ── Restore ───────────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore Sencilla.sln

      # ── Build ─────────────────────────────────────────────────────────────
      # Version comes from Directory.Build.Common.props (set above).
      # /p:ContinuousIntegrationBuild=true enables deterministic builds.
      # /p:GeneratePackageOnBuild=false prevents packing during build (the explicit pack step handles it).
      - name: Build solution
        run: |
          dotnet build Sencilla.sln \
            --configuration Release \
            --no-restore \
            /p:ContinuousIntegrationBuild=true \
            /p:GeneratePackageOnBuild=false

      # ── Test ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: |
          dotnet test Sencilla.sln \
            --configuration Release \
            --no-build \
            --verbosity normal

      # ── Pack ──────────────────────────────────────────────────────────────
      # Packs ALL projects that have <IsPackable>true</IsPackable> (default for library projects).
      # Symbol generation (snupkg) is configured in libs/Directory.Build.props;
      # do NOT pass --include-symbols here — it overrides per-project opt-outs
      # (e.g. Source Generator projects that set <IncludeSymbols>false</IncludeSymbols>).
      - name: Pack NuGet packages
        run: |
          dotnet pack Sencilla.sln \
            --configuration Release \
            --no-build \
            --output ./artifacts/nuget

      # ── Pack SQL (dacpac) packages ────────────────────────────────────────
      # The *.sqlproj projects are NOT part of Sencilla.sln, so pack them
      # individually into the same artifacts folder (the push step globs all
      # *.nupkg). GeneratePackageOnBuild=false avoids the Microsoft.Build.Sql
      # "Pack <- _PackAsBuildAfterTarget" circular dependency. Version is taken
      # from Directory.Build.Common.props (set above).
      - name: Pack SQL (dacpac) packages
        run: |
          for proj in $(find libs -name '*.sqlproj' -not -path '*/obj/*' -not -path '*/bin/*'); do
            echo "Packing $proj"
            dotnet pack "$proj" \
              --configuration Release \
              --output ./artifacts/nuget \
              /p:ContinuousIntegrationBuild=true \
              /p:GeneratePackageOnBuild=false
          done

      # ── List packages (for debug / audit) ─────────────────────────────────
      - name: List produced packages
        run: ls -lh ./artifacts/nuget/

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload packages as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.VERSION }}
          path: ./artifacts/nuget/
          retention-days: 30

      # ── Push to NuGet.org ─────────────────────────────────────────────────
      # Requires a repository secret named NUGET_API_KEY.
      # --skip-duplicate: if a package version already exists, don't fail.
      - name: Push packages to NuGet.org
        run: |
          dotnet nuget push "./artifacts/nuget/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ── Push symbol packages ──────────────────────────────────────────────
      - name: Push symbol packages to NuGet.org
        continue-on-error: true  # symbol push failure should not fail the release
        run: |
          dotnet nuget push "./artifacts/nuget/*.snupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: "Release ${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: ./artifacts/nuget/*.nupkg
